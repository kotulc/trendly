# Local SearXNG meta search engine used by the `search` command.
services:
  searxng:
    image: searxng/searxng:latest
    container_name: trendly-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
