# Trendly server configuration: local paths, external services, per-command defaults.
data_dir: data                 # topic profiles, digests, sqlite db
output_dir: output             # generated rss feed
dashboard_dir: dashboard/dist  # built mdsite export served at / (see dashboard/mdsite.yaml)

# External services; `trendly check` pings each url. The llm entry works with any
# OpenAI-compatible server: LM Studio (:1234), Ollama (:11434/v1), vLLM, etc.
services:
  searxng: http://localhost:8080
  taggly: http://localhost:8000
  llm:
    url: http://localhost:1234/v1
    model: local-model      # model id to request; LM Studio uses whatever is loaded
    api_key: not-needed     # any non-empty string for local servers

# Per-step config sections; keys map onto each core module's Config model.
core:
  check:
    timeout: 3.0
  search:
    # Appended to each query to diversify and group results (override per topic profile)
    categories: [headlines, recent, events, policy, economy, technology]
    searx_categories: news  # searxng engine category parameter
    time_range: week
    top_n: 20               # results kept per query+category group
    keywords: true          # extract per-result keywords via taggly
  extract:
    min_length: 400   # chars of markdown below which the crawl4ai fallback kicks in
  enrich:
    top_n: 8          # tags requested from taggly per article
    timeout: 30.0
  judge:
    max_articles: 25       # set `model:` here to override the services.llm default
    dup_threshold: 0.75    # similarity to a deleted item above which articles are blocked
  publish:
    title: Trendly
    link: http://localhost:8100
    max_items: 50
  run:
    max_extract: 25  # highest-scoring new results extracted per run
